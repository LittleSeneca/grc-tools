# GitHub Pages configuration for grc-tools
# Enable Pages in repo Settings → Pages:
#   Source: Deploy from a branch
#   Branch: main, folder: / (root)

title: grc-tools
description: Open-source GRC policy templates, tools, and guidance

# Use minimal theme as base; custom layout + CSS do the rest
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Allow all markdown files to be served as pages
include:
  - "*.md"
  - "Guides/*.md"
  - "Resources/*.md"
  - "Policy-Templates/**/*.md"

exclude:
  - .gitignore
  - LICENSE
  - README.md
